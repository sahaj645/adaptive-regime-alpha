# All tunable parameters for the regime-switching SPY overlay.
seed: 0

data:
  etf_file: data/etf_ohlcv.csv
  raw_pit_dir: data/raw            # sp{500,400,600}_pit_*.csv (git-ignored)
  processed_dir: data/processed
  trade_asset: SPY
  benchmark_asset: SPY
  exclude_etfs: [XLC]              # late-listed (2018), dropped for constant N

constituents:
  gics_level: GICS_Ind_Group       # cross-section granularity for the AR
  weighting: cap                   # cap | equal
  split_threshold: 0.10            # |dShares| above this => use cap return (split-neutral)
  winsor_low: -0.50
  winsor_high: 0.75
  max_gap_days: 7

absorption_ratio:
  window: 252                      # trailing covariance window (days)
  n_components: 5                  # principal components in the numerator (~N/5)
  shift_window: 252                # standardized-shift normalization window (1y)
  short_ma: 15                     # standardized-shift short moving average

jump_model:
  burn_in: 150                     # drop initial days (slow-EWMA warm-up)
  n_states: 2
  halflife_downside_dev: 10
  halflife_sortino_short: 20
  halflife_sortino_long: 60
  halflife_trend: 120
  lambda_grid: [5, 10, 20, 40, 80, 160]
  cv_folds: 3
  cv_val_days: 126
  cv_embargo: 21
  n_seeds: 3

backtest:
  oos_start: "2020-01-01"
  first_train_year: 2019
  last_year: 2025
  trade_delay: 1                   # regime at close t -> traded t+delay
  cost_bps: 2.0

evaluation:
  bootstrap_n: 4000
  block_size: 21
  trading_days: 252

paths:
  results_dir: results

levers:
  # Lever 1 - volatility targeting (continuous sizing). Relaxes the binary 0/1
  # mandate: size = base_signal * clip(target_vol / trailing_realized_vol, 0, cap).
  vol_window: 20                   # trailing days for realized-vol estimate (causal)
  target_vols: [0.10, 0.15, 0.20]  # annualized vol levels to scale toward
  caps: [1.0, 1.5, 2.0]            # max daily position (leverage knob)

  # Lever 2 - cash yield. Risk-free carry earned on the uninvested fraction
  # (and paid as financing on any leverage). Annual 3-month T-bill averages
  # (FRED TB3MS/DGS3MO); ASSUMPTION - no rates series was in the data dump, so
  # swap an exact daily series here for production.
  risk_free_by_year:
    2020: 0.0036
    2021: 0.0004
    2022: 0.0202
    2023: 0.0513
    2024: 0.0500
    2025: 0.0400
  # Lever 3 - multi-asset overlay. Same JM regime filter run per asset, combined
  # equal-weight. XLC excluded (late 2018 listing); XLRE kept.
  multi_asset: [SPY, QQQ, XLB, XLE, XLF, XLI, XLK, XLP, XLRE, XLU, XLV, XLY]
  multi_asset_lambda: 40           # fixed JM penalty across basket (no per-asset CV)
